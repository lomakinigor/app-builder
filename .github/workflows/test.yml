# Runs the Vitest suite on every push to main and on every PR targeting main.
# Implements T-113 / testing-strategy.md §CI gate.
#
# Failure blocks the merge — configure branch protection in:
# GitHub → Settings → Branches → main → Require status checks → "test"

name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
