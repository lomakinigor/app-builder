# T-020 — Critical E2E gate: E2E-001 happy-path is a required merge check for main.
#
# Scope: runs only tests/e2e/happy-path.spec.ts (the E2E-001 scenario).
# The full suite (sound-notifications, etc.) is covered by e2e.yml and is
# informational only.  This workflow is the one to add to branch protection.
#
# Stability: one retry in CI (matches playwright.config.ts default for CI).
# Artifacts: trace + screenshots uploaded on failure for deterministic diagnosis.
# No Netlify dependency — runs independently of deploy.yml.
#
# Manual branch-protection step:
#   GitHub → Settings → Branches → main → Require status checks →
#   add "e2e-critical" (this workflow's job name).

name: e2e-critical

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-critical:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run critical E2E gate (E2E-001)
        run: npm run test:e2e:critical

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-critical-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
