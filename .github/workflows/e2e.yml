# E2E-001 — Playwright happy-path test.
# Runs separately from the Vitest suite (test.yml) because it needs:
#   1. Browser binaries (chromium via playwright install)
#   2. A running dev server (handled by webServer in playwright.config.ts)
#
# Trigger: same as test.yml — push/PR to main.
# This job is intentionally NOT a merge-gate yet (no required status check).
# Once the E2E suite is proven stable, add it to branch protection.

name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
